services:
  - type: web
    name: dy-shows-bot
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_ID
        value: "2103419593"
      - key: WEBHOOK_URL
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /healthz
